{% extends 'monitoring/base.html' %}

{% block title %}
Camera Logs
{% endblock %}

{% block content %}

<div class="topbar">

    <h1>
        Camera Logs
    </h1>

</div>

<div class="logs-section">

    <div class="log-box scrollable-log-box">

        <input
            type="text"
            id="log-search"
            placeholder="Search camera logs..."
            class="log-search"
        >

        <ul id="log-list">

            {% for log in cameraLogs %}

            <li>

                {{ log.event }} -
                {{ log.timestamp }}

            </li>

            {% endfor %}

        </ul>

    </div>

</div>

<script>

const searchInput =
    document.getElementById("log-search");

searchInput.addEventListener("keyup", () => {

    const filter =
        searchInput.value.toLowerCase();

    const logs =
        document.querySelectorAll("#log-list li");

    logs.forEach(log => {

        const text =
            log.textContent.toLowerCase();

        log.style.display =
            text.includes(filter)
            ? ""
            : "none";

    });

});

</script>

{% endblock %}
