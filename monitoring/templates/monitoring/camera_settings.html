{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>Camera Settings</title>

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <link
        rel="stylesheet"
        href="{% static 'css/style.css' %}"
    >

</head>

<body>

<button id="menu-toggle">
    ☰
</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

    <h2>NET-AD</h2>

    <a href="/dashboard/">
        Dashboard
    </a>

    <a href="/camera-settings/">
        Camera Settings
    </a>

    <a href="/logs/">
        Website Logs
    </a>

    <a href="/login-attempts/">
        Login Attempts
    </a>

    <a href="/camera-logs/">
        Camera Logs
    </a>

    <br>

    <button id="theme-toggle">

        🌙 Toggle Theme

    </button>

    <br><br>

    <a href="{% url 'logout' %}">
        Logout
    </a>

</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">

        <h1>
            Camera Settings
        </h1>

    </div>

    <div class="logs-section">

        <h2>

            Camera Source Configuration

        </h2>

        <div class="log-box">

            <form method="POST">

                {% csrf_token %}

                <!-- CAMERA MODE -->
                <label>

                    Camera Mode

                </label>

                <br><br>

                <select
                    name="camera_mode"
                    class="camera-select"
                    id="camera-mode"
                >

                    <option
                        value="local"
                        {% if current_mode == "local" %}
                        selected
                        {% endif %}
                    >

                        Local Camera

                    </option>

                    <option
                        value="ip"
                        {% if current_mode == "ip" %}
                        selected
                        {% endif %}
                    >

                        IP Camera / RTSP

                    </option>

                </select>

                <br><br>

                <!-- LOCAL CAMERA -->
                <div id="local-camera-box">

                    <label>

                        Select Local Camera

                    </label>

                    <br><br>

                    <select
                        name="camera_index"
                        class="camera-select"
                    >

                        {% for camera in available_cameras %}

                        <option
                            value="{{ forloop.counter0 }}"
                            {% if forloop.counter0 == current_camera %}
                            selected
                            {% endif %}
                        >

                            {{ camera }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <!-- IP CAMERA -->
                <div
                    id="ip-camera-box"
                    style="display:none;"
                >

                    <label>

                        IP Camera URL

                    </label>

                    <br><br>

                    <input
                        type="text"
                        name="camera_url"
                        class="camera-select"
                        placeholder="rtsp:// or http://"
                        value="{{ current_url }}"
                    >

                    <br><br>

                    <small>

                        Example:
                        rtsp://192.168.1.10:554/stream

                    </small>

                </div>

                <br><br>

                <button
                    type="submit"
                    class="save-camera-btn"
                >

                    Save Camera Configuration

                </button>

            </form>

        </div>

    </div>

</div>

<!-- CAMERA MODE SWITCH -->
<script>

const cameraMode =
    document.getElementById("camera-mode");

const localBox =
    document.getElementById("local-camera-box");

const ipBox =
    document.getElementById("ip-camera-box");

function updateCameraMode(){

    if(cameraMode.value === "local"){

        localBox.style.display = "block";

        ipBox.style.display = "none";

    }

    else{

        localBox.style.display = "none";

        ipBox.style.display = "block";

    }

}

cameraMode.addEventListener(
    "change",
    updateCameraMode
);

updateCameraMode();

</script>

<!-- THEME -->
<script>

const toggleButton =
    document.getElementById("theme-toggle");

if(localStorage.getItem("theme") === "light"){

    document.body.classList.add("light-mode");

}

toggleButton.addEventListener("click", () => {

    document.body.classList.toggle("light-mode");

    if(document.body.classList.contains("light-mode")){

        localStorage.setItem("theme", "light");

    }

    else{

        localStorage.setItem("theme", "dark");

    }

});

</script>

<!-- SIDEBAR -->
<script>

const menuToggle =
    document.getElementById("menu-toggle");

const sidebar =
    document.getElementById("sidebar");

menuToggle.addEventListener("click", () => {

    sidebar.classList.toggle("show-sidebar");

});

</script>

</body>

</html>
